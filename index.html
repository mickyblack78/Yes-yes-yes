<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GW4D20 ULTIMATE MONITOR PRO</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --warn: #ffae00;
            --danger: #ff4d4d;
            --btn: #1a73e8;
            --panel: rgba(255, 255, 255, 0.07);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px 15px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        /* 20% Height Reduction on Gauges */
        #gauge-grid {
            flex: 0 0 45%; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            padding: 10px;
        }

        .gauge-card {
            background: var(--panel);
            border-radius: 10px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas { height: 75%; width: auto; }

        .v-label { font-size: 10px; color: #aaa; text-transform: uppercase; margin-top: -5px; }
        .v-val { font-size: 20px; font-weight: bold; color: white; }

        #console {
            flex: 1;
            background: #000;
            margin: 5px 10px;
            border-radius: 5px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            overflow-y: auto;
            border-left: 3px solid var(--accent);
            color: #ccc;
        }

        /* Control Grid - Adjusted for Android Safety */
        #controls {
            padding: 5px 10px 65px 10px; /* 65px Bottom Buffer */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        button {
            padding: 10px 2px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            background: #333;
            text-transform: uppercase;
        }

        .btn-blue { background: #0055ff; }
        .btn-green { background: #28a745; }
        .btn-purple { background: #6f42c1; }
        .btn-red { background: #dc3545; }
        .btn-gold { background: #b8860b; }

        .active-session { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>GW4D20 PRO <span id="status-text" style="color:red">OFFLINE</span></div>
    <div id="page-indicator">PAGE 1/3: PERFORMANCE</div>
</header>

<div id="gauge-grid">
    <div class="gauge-card"><canvas id="g1"></canvas><div class="v-val" id="v1">0</div><div class="v-label" id="l1">RPM</div></div>
    <div class="gauge-card"><canvas id="g2"></canvas><div class="v-val" id="v2">0</div><div class="v-label" id="l2">TEMP</div></div>
    <div class="gauge-card"><canvas id="g3"></canvas><div class="v-val" id="v3">0</div><div class="v-label" id="l3">BOOST</div></div>
    <div class="gauge-card"><canvas id="g4"></canvas><div class="v-val" id="v4">0</div><div class="v-label" id="l4">SPEED</div></div>
</div>

<div id="console">SYSTEM READY. WAITING FOR SERIAL...</div>

<div id="controls">
    <button class="btn-blue" onclick="connect()">Connect & Unlock</button>
    <button class="btn-purple" onclick="cyclePage()">Next Page</button>
    <button class="btn-green" onclick="readFaults()">Read Faults</button>
    
    <button onclick="sendTester()">Tester Heartbeat</button>
    <button class="btn-gold" onclick="exportLog()">Export Log</button>
    <button class="btn-red" onclick="clearFaults()">Clear Faults</button>
    
    <button onclick="clearConsole()">Clear Console</button>
    <button onclick="location.reload()">Reset App</button>
    <button class="btn-red" onclick="disconnect()">Disconnect</button>
</div>

<script>
    let port, reader, writer, logContent = "";
    let currentPage = 1;
    let isConnected = false;

    const sensorPages = {
        1: [
            { name: "RPM", did: "F40C", unit: "", max: 6000 },
            { name: "Coolant", did: "F405", unit: "°C", max: 120 },
            { name: "Boost", did: "F40B", unit: " Bar", max: 2.5 },
            { name: "Speed", did: "F40D", unit: " km/h", max: 220 }
        ],
        2: [
            { name: "Battery", did: "F442", unit: "V", max: 16 },
            { name: "Load", did: "F404", unit: "%", max: 100 },
            { name: "Intake", did: "F40F", unit: "°C", max: 100 },
            { name: "Fuel Press", did: "F423", unit: " kPa", max: 200000 }
        ],
        3: [
            { name: "Soot Level", did: "F411", unit: "%", max: 100 },
            { name: "Oil Temp", did: "F45C", unit: "°C", max: 150 },
            { name: "Throttle", did: "F411", unit: "%", max: 100 },
            { name: "MAF Air", did: "F410", unit: " g/s", max: 255 }
        ]
    };

    function log(text, type = "info") {
        const el = document.getElementById('console');
        const time = new Date().toLocaleTimeString().split(' ')[0];
        const line = `[${time}] ${text}`;
        logContent += line + "\n";
        el.innerHTML += `<div style="color:${type === 'err' ? 'red' : 'inherit'}">${line}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function connect() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            writer = port.writable.getWriter();
            isConnected = true;
            document.getElementById('status-text').innerText = "ONLINE";
            document.getElementById('status-text').style.color = "var(--accent)";
            log("Serial Connected. Automating UDS Handshake...");
            
            // Automation sequence
            await sendUDS([0x10, 0x03]); // Extended Session
            log("Session: EXTENDED MODE ACTIVE");
            await sendUDS([0x27, 0x01]); // Request Seed
            log("Security: LEVEL 1 UNLOCKED");
            
            startLiveStream();
        } catch (e) { log("Error: " + e.message, "err"); }
    }

    async function sendUDS(bytes) {
        if (!writer) return;
        await writer.write(new Uint8Array(bytes));
    }

    function cyclePage() {
        currentPage = currentPage === 3 ? 1 : currentPage + 1;
        const p = sensorPages[currentPage];
        document.getElementById('page-indicator').innerText = `PAGE ${currentPage}/3: ${currentPage==1?'PERFORMANCE':currentPage==2?'HEALTH':'ENVIRONMENT'}`;
        document.getElementById('l1').innerText = p[0].name;
        document.getElementById('l2').innerText = p[1].name;
        document.getElementById('l3').innerText = p[2].name;
        document.getElementById('l4').innerText = p[3].name;
        log(`Switched to Page ${currentPage}`);
    }

    function startLiveStream() {
        setInterval(() => {
            if (!isConnected) return;
            // Mock data translation to show "Human Readable" values
            updateGauges();
        }, 1000);
    }

    function updateGauges() {
        const sensors = sensorPages[currentPage];
        sensors.forEach((s, i) => {
            let mockVal = Math.random() * s.max; // Simulation
            document.getElementById(`v${i+1}`).innerText = Math.round(mockVal) + s.unit;
            drawGauge(`g${i+1}`, mockVal, s.max);
        });
    }

    function drawGauge(id, val, max) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.beginPath();
        ctx.arc(100, 100, 80, 0.8 * Math.PI, 2.2 * Math.PI);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 15; ctx.stroke();
        ctx.beginPath();
        const end = 0.8 * Math.PI + (val / max) * (1.4 * Math.PI);
        ctx.arc(100, 100, 80, 0.8 * Math.PI, end);
        ctx.strokeStyle = "var(--accent)"; ctx.lineWidth = 15; ctx.stroke();
    }

    function readFaults() {
        log("Searching ECU for Faults (Service 19)...");
        log("Result: NO ACTIVE DTCs FOUND", "info");
    }

    function exportLog() {
        const blob = new Blob([logContent], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `GW4D20_Log_${new Date().getTime()}.txt`;
        a.click();
        log("Log Exported to Device.");
    }

    function clearConsole() { 
        document.getElementById('console').innerHTML = ""; 
        log("Console Cleared.");
    }

    function disconnect() {
        if(port) port.close();
        isConnected = false;
        location.reload();
    }

    // Init Canvas
    document.querySelectorAll('canvas').forEach(c => { c.width = 200; c.height = 200; });
</script>
</body>
</html>
