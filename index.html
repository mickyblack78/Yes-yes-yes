<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONITOR PRO</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --warn: #ffae00;
            --danger: #ff4d4d;
            --btn: #1a73e8;
            --panel: rgba(255, 255, 255, 0.07);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px 15px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        #gauge-grid {
            flex: 0 0 45%; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            padding: 10px;
        }

        .gauge-card {
            background: var(--panel);
            border-radius: 10px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas { height: 70%; width: auto; }
        .v-label { font-size: 10px; color: #aaa; text-transform: uppercase; margin-top: -5px; }
        .v-val { font-size: 20px; font-weight: bold; color: white; }

        #console {
            flex: 1;
            background: #000;
            margin: 5px 10px;
            border-radius: 5px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            overflow-y: auto;
            border-left: 3px solid var(--accent);
            color: #ccc;
        }

        #controls {
            padding: 5px 10px 65px 10px;
            min-height: 140px;
        }

        .ctrl-page {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        button {
            padding: 12px 2px;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            background: #333;
            text-transform: uppercase;
        }

        .btn-blue { background: #0055ff; }
        .btn-green { background: #28a745; }
        .btn-purple { background: #6f42c1; }
        .btn-red { background: #dc3545; }
        .btn-gold { background: #b8860b; }
    </style>
</head>
<body>

<header>
    <div>GW4D20 PRO <span id="status-text" style="color:red">OFFLINE</span></div>
    <div id="mode-indicator">MENU PAGE: 1</div>
</header>

<div id="gauge-grid">
    <div class="gauge-card"><canvas id="g1"></canvas><div class="v-val" id="v1">0</div><div class="v-label" id="l1">RPM</div></div>
    <div class="gauge-card"><canvas id="g2"></canvas><div class="v-val" id="v2">0</div><div class="v-label" id="l2">TEMP</div></div>
    <div class="gauge-card"><canvas id="g3"></canvas><div class="v-val" id="v3">0</div><div class="v-label" id="l3">BOOST</div></div>
    <div class="gauge-card"><canvas id="g4"></canvas><div class="v-val" id="v4">0</div><div class="v-label" id="l4">SPEED</div></div>
</div>

<div id="console">SYSTEM READY.</div>

<div id="controls">
    <!-- Page 1: Primary Actions -->
    <div id="pg1" class="ctrl-page">
        <button class="btn-blue" onclick="connect()">Connect</button>
        <button class="btn-purple" onclick="setPage(2)">Menu P2</button>
        <button class="btn-green" onclick="sendCommand('19020D')">Read DTCs</button>
        
        <button id="live-btn" class="btn-gold" onclick="toggleLive()">Live: OFF</button>
        <button onclick="manualHex()">Send Hex</button>
        <button class="btn-red" onclick="sendCommand('14FFFFFF')">Clear DTCs</button>
        
        <button onclick="clearConsole()">Clear Log</button>
        <button onclick="exportLog()">Export Log</button>
        <button class="btn-red" onclick="location.reload()">Exit</button>
    </div>

    <!-- Page 2: The 9-Button Extended Menu -->
    <div id="pg2" class="ctrl-page" style="display:none">
        <button class="btn-purple" onclick="setPage(1)">Back</button>
        <button class="btn-blue" onclick="document.getElementById('fileIn').click()">Upload Log</button>
        <button class="btn-green" onclick="requestStdPids()">Scan PIDs</button>
        
        <button onclick="sendCommand('22F190')">VIN (UDS)</button>
        <button onclick="sendCommand('0100')">Supported</button>
        <button onclick="log('ECU ID: Delphi DCM3.7')">ECU Info</button>
        
        <button onclick="log('Freeze Frame Not Implemented')">Freeze</button>
        <button onclick="log('Timing Sync - Ready')">Timing</button>
        <button class="btn-red" onclick="location.reload()">Reset App</button>
    </div>
</div>

<input type="file" id="fileIn" style="display:none" onchange="handleFile(event)">

<script>
    let port, writer, reader, logContent = "";
    let isConnected = false;
    let isLive = false;
    let liveInterval;

    function log(text, type = "info") {
        const el = document.getElementById('console');
        const line = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${text}`;
        logContent += line + "\n";
        el.innerHTML += `<div style="color:${type==='err'?'red':(type==='rx'?'#00f2ff':'#ccc')}">${line}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function connect() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            writer = port.writable.getWriter();
            isConnected = true;
            
            document.getElementById('status-text').innerText = "ONLINE";
            document.getElementById('status-text').style.color = "var(--accent)";
            
            readLoop();
            log("Opening Connection...");
            
            // The Sequence: Reset -> Set Protocol -> Echo Off
            await sendCommand("ATZ");
            await new Promise(r => setTimeout(r, 500));
            await sendCommand("AT SP 6"); 
            await new Promise(r => setTimeout(r, 500));
            await sendCommand("ATE0"); 
            
            log("Handshake Complete. ECU Ready.");
        } catch (e) { log("Error: " + e.message, "err"); }
    }

    async function sendCommand(cmd) {
        if (!writer) return;
        await writer.write(new TextEncoder().encode(cmd + "\r"));
        log("TX: " + cmd);
    }

    async function readLoop() {
        let multiLineBuffer = ""; // Store fragments here
        while (port.readable) {
            reader = port.readable.getReader();
            try {
                let buffer = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += new TextDecoder().decode(value);

                    if (buffer.includes('\r') || buffer.includes('>')) {
                        let cleanData = buffer.replace(/>/g, '').trim();
                        
                        // Check if this is a UDS multi-line fragment (e.g., "0: 62 F1...")
                        if (cleanData.match(/^[0-9]:/)) {
                            // Strip the "0: " and append the hex to our multi-line holder
                            multiLineBuffer += cleanData.substring(2).trim() + " ";
                        } else {
                            // If it's a standard response, process it immediately
                            if (cleanData) {
                                log("RX: " + cleanData, "rx");
                                parseOBD(cleanData);
                            }
                        }

                        // If the buffer had a '>', the ECU is done talking, 
                        // so we process any multi-line data we collected.
                        if (buffer.includes('>') && multiLineBuffer.length > 0) {
                            const fullResponse = multiLineBuffer.trim();
                            log("RX (Full): " + fullResponse, "rx");
                            parseOBD(fullResponse);
                            multiLineBuffer = ""; // Clear for next time
                        }
                        
                        buffer = ""; 
                    }
                }
            } catch (e) { log("Read Error: " + e.message, "err"); break; }
            finally { reader.releaseLock(); }
        }
    }
    function parseOBD(data) {
        const parts = data.trim().split(/\s+/);
        
        // 1. RPM (01 0C) - Confirmed at 750 RPM
        if (data.includes("41 0C")) {
            const idx = parts.indexOf("0C") + 1;
            const rpm = ((parseInt(parts[idx], 16) * 256) + parseInt(parts[idx+1], 16)) / 4;
            document.getElementById('v1').innerText = Math.round(rpm);
            drawGauge('g1', rpm, 0, 5000, 'RPM');
        }
        
        // 2. FUEL RAIL PRESSURE (01 23) - Confirmed at 26.1 MPa
        if (data.includes("41 23")) {
            const idx = parts.indexOf("23") + 1;
            const frp = (parseInt(parts[idx], 16) * 256 + parseInt(parts[idx+1], 16)) * 10;
            const mpa = (frp / 1000).toFixed(1);
            document.getElementById('v2').innerText = mpa;
            drawGauge('g2', mpa, 0, 180, 'MPa'); // Using Temp gauge for Fuel Pressure for now
        }

        // 3. BOOST / MAP (01 0B) - Confirmed at 102 kPa
        if (data.includes("41 0B")) {
            const idx = parts.indexOf("0B") + 1;
            const map = parseInt(parts[idx], 16); 
            const boost = Math.max(0, (map - 101) * 0.145); 
            document.getElementById('v3').innerText = boost.toFixed(1);
            drawGauge('g3', boost, 0, 30, 'PSI');
        }

        // 4. ENGINE LOAD (01 04) - Confirmed at 14%
        if (data.includes("41 04")) {
            const idx = parts.indexOf("04") + 1;
            const load = Math.round(parseInt(parts[idx], 16) / 2.55);
            document.getElementById('v4').innerText = load;
            drawGauge('g4', load, 0, 100, '% LOAD'); // Using Speed gauge for Load for now
        }
    }

    function setPage(num) {
        document.getElementById('pg1').style.display = num === 1 ? 'grid' : 'none';
        document.getElementById('pg2').style.display = num === 2 ? 'grid' : 'none';
        document.getElementById('mode-indicator').innerText = `MENU PAGE: ${num}`;
    }

    function toggleLive() {
        isLive = !isLive;
        const btn = document.getElementById('live-btn');
        btn.innerText = isLive ? "Live: ON" : "Live: OFF";
        btn.style.background = isLive ? "var(--accent)" : "#333";
        
        if (isLive) {
            log("Live Stream Started");
            liveInterval = setInterval(async () => {
                if (isConnected && writer) {
                    // Request RPM, MAP (Boost), and Fuel Rail Pressure
                    await sendCommand("010C"); 
                    await new Promise(r => setTimeout(r, 200));
                    await sendCommand("010B");
                    await new Promise(r => setTimeout(r, 200));
                    await sendCommand("0123");
                }
            }, 1500); // 1.5s interval to allow ELM327 to respond fully
        } else {
            clearInterval(liveInterval);
            log("Live Stream Stopped");
        }
    }

    async function manualHex() {
        const hex = prompt("Enter Hex:");
        if (hex) await sendCommand(hex.toUpperCase());
    }

    async function requestStdPids() {
        // 0104: Engine Load, 0123: Fuel Rail Pressure, 010B: MAP, 010E: Timing Advance
        const targetPids = ["0104", "0123", "010B", "010E", "0110", "0151"];
        
        log("--- HUNTING DIESEL DATA ---");
        for (let cmd of targetPids) {
            if (!isConnected) break;
            await sendCommand(cmd);
            await new Promise(r => setTimeout(r, 400)); 
        }
        log("--- HUNT COMPLETE ---");
    }
    function handleFile(e) {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                log(`Processing ${f.name}: ${lines.length} lines found.`);
                lines.forEach((line, index) => {
                    if (line.includes('RX:')) {
                        const parts = line.split('RX:');
                        if (parts.length > 1) {
                            const hexData = parts[1].trim();
                            setTimeout(() => {
                                log("Replaying: " + hexData, "rx");
                                parseOBD(hexData);
                            }, index * 100);
                        }
                    }
                });
            };
            r.readAsText(f); 
        }
    }

    function exportLog() {
        const blob = new Blob([logContent], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `GW_Log_${Date.now()}.txt`;
        a.click();
    }

    function clearConsole() { document.getElementById('console').innerHTML = ""; logContent = ""; }
function drawGauge(id, val, min, max, unit) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = 200; c.height = 200;
        ctx.clearRect(0, 0, 200, 200);
        
        // Draw Track
        ctx.beginPath();
        ctx.arc(100, 110, 80, 0.8 * Math.PI, 0.2 * Math.PI);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 10;
        ctx.stroke();

        // Draw Value Bar
        const angle = 0.8 * Math.PI + (1.4 * Math.PI * ((val - min) / (max - min)));
        ctx.beginPath();
        ctx.arc(100, 110, 80, 0.8 * Math.PI, angle);
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 10;
        ctx.stroke();

        // Label unit
        ctx.fillStyle = '#aaa';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(unit, 100, 140);
      // Draw the actual number value in the center
        ctx.fillStyle = '#fff'; // White text
        ctx.font = 'bold 24px Arial'; // Larger, bold font
        ctx.fillText(Math.round(val), 100, 110); // Positioned slightly above the unit label
    }

    // Initial draw for all 4 gauges
    drawGauge('g1', 0, 0, 5000, 'RPM');
    drawGauge('g2', 0, 0, 120, 'TEMP');
    drawGauge('g3', 0, 0, 30, 'BOOST');
    drawGauge('g4', 0, 0, 200, 'KMH');
</script>
</body>
</html>
