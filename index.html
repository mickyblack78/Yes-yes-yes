<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOV</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff0000; --text: #e0e0e0; --panel: #1a1a1a; --glow: 0 0 10px #ff0000; }
    </style>
    <style>
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; overflow: hidden; }
        #app { display: grid; grid-template-columns: 60px 1fr; height: 100vh; }
    </style>
    <style>
        #sidebar { background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding-top: 10px; overflow-y: auto; }
        .slot-btn { width: 40px; height: 40px; margin: 5px 0; border: 1px solid #444; background: #222; color: #888; cursor: pointer; transition: 0.2s; }
        .slot-btn.active { border-color: var(--accent); color: white; box-shadow: var(--glow); }
    </style>
    <style>
        #controls { height: 50px; background: #111; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between; }
        .redwater-glow { text-shadow: var(--glow); color: var(--accent); font-weight: bold; letter-spacing: 1px; }
        select, button { background: #222; color: white; border: 1px solid #444; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar" id="slot-container"></div>

    <div id="main" style="display: flex; flex-direction: column;">
        <div id="controls">
            <div class="redwater-glow" id="brand">SOVEREIGN v5.9</div>
            <div>
                <select id="ext-select">
                    <option value="txt">.txt</option>
                    <option value="js">.js</option>
                    <option value="html">.html</option>
                    <option value="css">.css</option>
                    <option value="json">.json</option>
                    <option value="sh">.sh</option>
                    <option value="run">.run</option>
                    <option value="pdf">.pdf</option>
                </select>
                <button id="save-trigger">💾 SAVE TO PHONE</button>
            </div>
        </div>

        <textarea id="editor" spellcheck="false" placeholder="Ample Space awaiting input... " style="flex-grow: 1; background: transparent; color: #00ff00; border: none; padding: 20px; font-size: 16px; outline: none; resize: none;"></textarea>

        <div id="status-bar" style="height:25px; font-size:12px; padding:5px 15px; background:#000; color:#666; border-top:1px solid #222; display: flex; justify-content: space-between;">
            <div id="terminal-out">SYSTEM READY</div>
            <div>RAM: <span id="mem-count">0</span> | SLOT: <span id="active-label">1</span></div>
        </div>
    </div>
</div>

<script>
    /* Block 9: Memory Initialization (Connecting to RAM) */
    let currentSlot = 1;
    const editor = document.getElementById('editor');
    const sidebar = document.getElementById('sidebar');

    /* Block 10: Slot Generation (Building the 100 buttons) */
    function createSlotButtons() {
        for(let i=1; i<=100; i++) {
            let b = document.createElement('button');
            b.className = 'slot-btn';
            b.innerText = i;
            b.id = 'slot-' + i;
            b.onclick = () => handleSlotClick(i);
            sidebar.appendChild(b);
        }
    }

    /* Block 11: Persistent Save Engine (Auto-save to internal space) */
    function saveToInternal() {
        localStorage.setItem('sov_storage_slot_' + currentSlot, editor.value);
        updateCharCount();
        terminalLog("AUTO-SAVED SLOT " + currentSlot);
    }

    function loadFromInternal(n) {
        return localStorage.getItem('sov_storage_slot_' + n) || '';
    }

    /* Block 12: Slot Management (Switching logic) */
    function handleSlotClick(n) {
        preventDataLoss();
        switchSlot(n);
    }

    function switchSlot(n) {
        currentSlot = n;
        editor.value = loadFromInternal(n);
        highlightActiveSlot(n);
        updateActiveLabel(n);
        updateCharCount();
    }

    function highlightActiveSlot(n) {
        document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('slot-' + n).classList.add('active');
    }

    /* Block 13: The Extension Matrix (The MIME dictionary) */
    function getMime(ext) {
        const matrix = {
            txt: 'text/plain',
            js: 'application/javascript',
            html: 'text/html',
            css: 'text/css',
            json: 'application/json',
            sh: 'application/x-sh',
            run: 'application/octet-stream',
            pdf: 'application/pdf'
        };
        return matrix[ext] || 'text/plain';
    }

    /* Block 14: The Casting Bridge (Force Download logic) */
    function castFile() {
        const ext = document.getElementById('ext-select').value;
        const fileName = `sov_export_s${currentSlot}.${ext}`;
        const blob = constructBlob(editor.value, getMime(ext));
        const anchor = createGhostAnchor(blob, fileName);
        triggerDownload(anchor);
        cleanupAnchor(anchor, blob);
    }

    function constructBlob(data, type) { return new Blob([data], { type: type }); }
    
    function createGhostAnchor(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.style.display = 'none';
        document.body.appendChild(a);
        return a;
    }

    function triggerDownload(a) { a.click(); terminalLog("FILE CAST SUCCESSFUL"); }

    function cleanupAnchor(a, b) {
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(a.href), 100);
    }

    // Helper Functions for UI Logic
    function updateCharCount() { document.getElementById('mem-count').innerText = editor.value.length; }
    function updateActiveLabel(n) { document.getElementById('active-label').innerText = n; }
    function terminalLog(msg) { document.getElementById('terminal-out').innerText = "> " + msg; }
    function preventDataLoss() { saveToInternal(); }
    function applyRedwater() { console.log("Redwater Baseline Active"); }

    // Initialization
    function initApp() {
        createSlotButtons();
        switchSlot(1);
        editor.oninput = () => {
            updateCharCount();
            saveToInternal();
        };
        document.getElementById('save-trigger').onclick = castFile;
        applyRedwater();
    }

    initApp();
</script>
</body>
</html>
