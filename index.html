<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW4D20 ULTIMATE MONITOR</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00f2ff;
            --warn: #ffae00;
            --danger: #ff4d4d;
            --panel: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px;
            background: linear-gradient(to bottom, #1a1a1e, #0a0a0c);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            display: inline-block;
        }

        .active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #main-display {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .gauge-card {
            background: var(--panel);
            border-radius: 15px;
            border: 1px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 90%; max-height: 90%; }

        .label {
            position: absolute;
            bottom: 15px;
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
        }

        .value-overlay {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: white;
            bottom: 40px;
        }

        #console-panel {
            height: 150px;
            background: #000;
            border-top: 2px solid var(--accent);
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            overflow-y: auto;
            color: #00ff00;
        }

        .controls {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #111;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button#connect-btn { background: #0066ff; }
        button#fault-btn { background: #6610f2; }
        button#clear-btn { background: #dc3545; }

        .warning-flash {
            animation: flash-red 0.5s infinite;
        }

        @keyframes flash-red {
            0% { background: var(--panel); }
            50% { background: rgba(255, 77, 77, 0.3); }
            100% { background: var(--panel); }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--accent);">GW4D20 MONITOR V2.0</div>
    <div class="status-bar">
        <span>Session: <span id="dot-session" class="status-dot"></span></span>
        <span>Security: <span id="dot-security" class="status-dot"></span></span>
    </div>
</header>

<div id="main-display">
    <div class="gauge-card" id="card-rpm">
        <canvas id="gauge-rpm"></canvas>
        <div class="value-overlay" id="val-rpm">0</div>
        <div class="label">ENGINE RPM</div>
    </div>
    <div class="gauge-card" id="card-temp">
        <canvas id="gauge-temp"></canvas>
        <div class="value-overlay" id="val-temp">0°C</div>
        <div class="label">COOLANT</div>
    </div>
    <div class="gauge-card" id="card-boost">
        <canvas id="gauge-boost"></canvas>
        <div class="value-overlay" id="val-boost">0.0</div>
        <div class="label">BOOST (BAR)</div>
    </div>
    <div class="gauge-card" id="card-soot">
        <canvas id="gauge-soot"></canvas>
        <div class="value-overlay" id="val-soot">0%</div>
        <div class="label">DPF SOOT</div>
    </div>
</div>

<div id="console-panel">READY TO CONNECT...</div>

<div class="controls">
    <button id="connect-btn" onclick="initSerial()">CONNECT & INITIALIZE</button>
    <button id="fault-btn" onclick="readFaults()">CHECK FAULTS (19 02)</button>
    <button id="clear-btn" onclick="clearFaults()">CLEAR ALL</button>
</div>

<script>
    let port;
    let reader;
    let writer;
    let isStreaming = false;
    let sessionActive = false;

    // UDS Service Configuration
    const SERVICES = {
        EXTENDED: [0x10, 0x03],
        TESTER_PRESENT: [0x3E, 0x80],
        READ_DTC: [0x19, 0x02, 0x08],
        CLEAR_DTC: [0x14, 0xFF, 0xFF, 0xFF],
        READ_DATA: 0x22
    };

    // PIDs for GW4D20 (Standardized for this app)
    const DIDs = {
        RPM: [0xF4, 0x0C],
        TEMP: [0xF4, 0x05],
        BOOST: [0xF4, 0x0B],
        SOOT: [0xF4, 0x11]
    };

    async function log(msg, color = "#00ff00") {
        const console = document.getElementById('console-panel');
        console.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        console.scrollTop = console.scrollHeight;
    }

    async function initSerial() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            writer = port.writable.getWriter();
            log("SERIAL PORT OPENED", "#00f2ff");
            
            await setupUDS();
        } catch (e) {
            log("CONNECTION FAILED: " + e.message, "red");
        }
    }

    async function setupUDS() {
        log("INITIALIZING EXTENDED SESSION (10 03)...");
        await sendCommand(SERVICES.EXTENDED);
        document.getElementById('dot-session').classList.add('active');
        
        // Start Tester Present Heartbeat (Keep Session Alive)
        setInterval(() => {
            if (port) sendCommand(SERVICES.TESTER_PRESENT);
        }, 3000);

        startMonitoring();
    }

    async function sendCommand(hexArray) {
        if (!writer) return;
        const data = new Uint8Array(hexArray);
        await writer.write(data);
        // In a real app, you'd implement a reader to handle Response Pending (7F)
    }

    async function startMonitoring() {
        isStreaming = true;
        log("MONITORING START...");
        loop();
    }

    async function loop() {
        if (!isStreaming) return;

        // Mock data logic for visualization - replace with real serial read parsing
        updateGauge('gauge-rpm', Math.random() * 3000 + 800, 6000, 'val-rpm', '');
        updateGauge('gauge-temp', 85 + Math.random(), 120, 'val-temp', '°C');
        
        // Safety Check
        const temp = 85; 
        if(temp > 100) document.getElementById('card-temp').classList.add('warning-flash');
        else document.getElementById('card-temp').classList.remove('warning-flash');

        requestAnimationFrame(loop);
    }

    function updateGauge(id, val, max, valId, unit) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 60;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Track
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0.8 * Math.PI, 2.2 * Math.PI);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 8;
        ctx.stroke();

        // Fill
        const endAngle = 0.8 * Math.PI + (val / max) * (1.4 * Math.PI);
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0.8 * Math.PI, endAngle);
        ctx.strokeStyle = val > (max * 0.8) ? '#ff4d4d' : '#00f2ff';
        ctx.lineWidth = 8;
        ctx.stroke();

        document.getElementById(valId).innerText = Math.round(val) + unit;
    }

    async function readFaults() {
        log("QUERYING FAULTS (SERVICE 19)...", "#ffae00");
        await sendCommand(SERVICES.READ_DTC);
        // Expected response would be parsed here
    }

    async function clearFaults() {
        if(confirm("Confirm Clear All Diagnostic Data?")) {
            log("SENDING CLEAR COMMAND (14 FF FF FF)...", "red");
            await sendCommand(SERVICES.CLEAR_DTC);
        }
    }

    // Initialize Canvas sizes
    document.querySelectorAll('canvas').forEach(c => {
        c.width = 200;
        c.height = 200;
    });

</script>
</body>
</html>
